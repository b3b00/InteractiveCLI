name: Build

on:
  workflow_dispatch:
  push:
    branches: 
      - main
  pull_request:
    branches: 
      - main
permissions:
  pull-requests: write
  checks: write
jobs:  
  build:
    env:
      PUBLISH_NUGET: true # if true a nuget will be published on version change
      MAIN_CSPROJ: 'src/interactiveCLI/interactiveCLI.csproj' # main project (for nuget packaging)
      RUN_TESTS: true
      TESTS_PROJECT: tests/PromptTests/PromptTests.csproj
    runs-on: ${{ matrix.os }}
    strategy:
        matrix:
          os: [ubuntu-latest]
    steps:
    - uses: actions/checkout@v2
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: 8.0.x
    - name: Clean artifacts and nugets 
      run: dotnet clean  --configuration Release && dotnet nuget locals all --clear
    - name: Build with dotnet
      run: dotnet build --configuration Release ${{env.MAIN_CSPROJ}}
    - name: Test with dotnet
      uses: b3b00/coverlet-action@1.3.5
      id: 'coverlet'
      if: env.RUN_TESTS
      with:
        testProject: ${{env.TESTS_PROJECT}}
        output: 'lcov.net8.0.info'
        threshold: 40
        outputFormat: 'lcov'
        excludes: '[PromptTests]*,[InteractiveTest]*,[SourceGeneratorTests]*,[spectreTest]*,[TestProject]*'
    - name: coveralls
      uses: coverallsapp/github-action@v1.1.1
      if: matrix.os == 'ubuntu-latest' && env.RUN_TESTS
      with:
        fail-on-error: false
        github-token: ${{secrets.GITHUB_TOKEN }}
        path-to-lcov: ${{steps.coverlet.outputs.coverageFile}}
        #base-path: ${{github.workspace}}
    - name: publish nuget
      if:  ${{success() && matrix.os == 'ubuntu-latest' && env.PUBLISH_NUGET}}
      id: publish_nuget
      uses: alirezanet/publish-nuget@v3.0.0
      with:
          VERSION_REGEX: <version>(.*)<\/version>  
          PROJECT_FILE_PATH: ${{env.MAIN_CSPROJ}}
          NUGET_KEY: ${{secrets.NUGET_KEY}}
          VERSION_FILE_PATH: ${{env.MAIN_CSPROJ}}
          INCLUDE_SYMBOLS: true
    - name: Create Release
      if: ${{ success() && matrix.os == 'ubuntu-latest' && steps.publish_nuget.outputs.VERSION != ''  && steps.publish_nuget.outputs.VERSION != null }}
      id: create_release
      uses: b3b00/create-release@1.0.7
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
      with:
        tag_name: ${{ steps.publish_nuget.outputs.VERSION }}
        release_name: Release ${{ steps.publish_nuget.outputs.VERSION }}
        draft: false
        prerelease: false
        failsOnCreationError: false
    - name: Upload Release nuget Asset
      if: ${{ success() && matrix.os == 'ubuntu-latest' && steps.create_release.outputs.upload_url != ''  && steps.create_release.outputs.upload_url != null }}
      id: upload-release-nuget-asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ steps.publish_nuget.outputs.PACKAGE_PATH }}
        asset_name: ${{ steps.publish_nuget.outputs.PACKAGE_NAME }}
        asset_content_type: application/zip
    - name: Upload Release symbols nuget Asset
      if: ${{ success() && matrix.os == 'ubuntu-latest' && steps.create_release.outputs.upload_url != ''  && steps.create_release.outputs.upload_url != null }}
      id: upload-release-nuget-symbols-asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ steps.publish_nuget.outputs.SYMBOLS_PACKAGE_PATH }}
        asset_name: ${{ steps.publish_nuget.outputs.SYMBOLS_PACKAGE_NAME }}
        asset_content_type: application/zip

